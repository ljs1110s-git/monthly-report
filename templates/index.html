<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>충청남도 수산정보 월간 보고서</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --line: #d8e1ed;
      --line-soft: #e8eef6;
      --text: #172033;
      --muted: #6b778c;
      --primary: #1f5edb;
      --primary-dark: #184bb0;
      --primary-soft: #eaf1ff;
      --success: #16803c;
      --shadow: 0 18px 42px rgba(20, 31, 52, .09);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Malgun Gothic", "Noto Sans KR", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(232, 239, 252, .82) 0%, rgba(244, 247, 251, 1) 280px),
        var(--bg);
    }

    .page {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 28px 0 36px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 10px 24px rgba(36, 99, 235, .22);
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, .92);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      min-height: 58px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line-soft);
      background: var(--surface-soft);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title {
      margin: 0;
      font-size: 15px;
      font-weight: 800;
    }

    .file-name {
      color: var(--muted);
      font-size: 12px;
      max-width: 420px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .viewer {
      background: #eef2f7;
      min-height: 680px;
    }

    .viewer {
      padding: 18px;
      overflow-x: auto;
    }

    .pdf-page {
      display: block;
      width: 100%;
      max-width: 960px;
      height: auto;
      margin: 0 auto 16px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      box-shadow: 0 10px 24px rgba(20, 31, 52, .08);
    }

    .pdf-page:last-child {
      margin-bottom: 0;
    }

    .viewer iframe {
      display: block;
      width: 100%;
      height: 680px;
      border: 0;
      background: #fff;
    }

    .viewer-message {
      min-height: 680px;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .viewer-toolbar {
      display: none;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .viewer-toolbar.is-visible {
      display: flex;
    }

    .viewer-button {
      min-width: 34px;
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      padding: 0 10px;
    }

    .viewer-button:hover {
      background: var(--primary-soft);
      border-color: #bdd2ff;
    }

    .zoom-label {
      min-width: 48px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .empty-viewer {
      min-height: 680px;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--muted);
      text-align: center;
    }

    .empty-card {
      max-width: 360px;
      padding: 28px;
      border: 1px dashed #b7c3d3;
      border-radius: 12px;
      background: rgba(255, 255, 255, .78);
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 900;
    }

    .side {
      display: grid;
      gap: 14px;
    }

    .file-list {
      list-style: none;
      margin: 0;
      padding: 10px;
      max-height: 420px;
      overflow-y: auto;
    }

    .file-item + .file-item { margin-top: 8px; }

    .file-link {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 9px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      text-align: left;
      transition: background .16s ease, border-color .16s ease;
    }

    .file-link:hover {
      background: var(--primary-soft);
      border-color: #bdd2ff;
    }

    .file-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #fee2e2;
      color: #b91c1c;
      font-size: 11px;
      font-weight: 900;
      flex: 0 0 auto;
    }

    .file-text {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
    }

    .empty-message {
      color: var(--muted);
      font-size: 13px;
      padding: 22px;
      text-align: center;
    }

    .upload-body {
      padding: 16px;
    }

    .upload-form {
      display: grid;
      gap: 10px;
    }

    input[type="password"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 10px 11px;
      font: inherit;
      font-size: 13px;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    input:focus {
      outline: 2px solid rgba(36, 99, 235, .20);
      border-color: var(--primary);
    }

    .file-picker {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      cursor: pointer;
    }

    .file-picker-button {
      border-radius: 7px;
      background: var(--primary-soft);
      color: var(--primary-dark);
      font-size: 13px;
      font-weight: 800;
      padding: 8px 10px;
      white-space: nowrap;
    }

    .selected-file {
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .upload-button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      padding: 11px 14px;
      transition: background .16s ease;
    }

    .upload-button:hover { background: var(--primary-dark); }

    .info-text {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .open-link {
      color: var(--primary);
      display: none;
      font-size: 12px;
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .open-link.is-visible { display: inline; }

    .open-link:hover { text-decoration: underline; }

    @media (max-width: 860px) {
      .page { width: min(100% - 24px, 1180px); padding-top: 18px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .layout { grid-template-columns: 1fr; }
      .viewer { min-height: 520px; padding: 10px; }
      .empty-viewer, .viewer-message { min-height: 520px; }
      .panel-header { align-items: flex-start; flex-wrap: wrap; }
      .viewer-toolbar { width: 100%; justify-content: flex-start; margin-left: 0; }
      .file-name { max-width: 230px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">문서</div>
        <div>
          <h1>충청남도 수산정보 월간 보고서</h1>
          <p class="subtitle">월간 수산정보 보고서를 확인할 수 있습니다.</p>
        </div>
      </div>
      <div class="status-pill"><span class="status-dot"></span><span id="documentCount">문서 0건</span></div>
    </header>

    <section class="layout">
      <article class="panel">
        <div class="panel-header">
          <div>
            <h2 class="panel-title">보고서 미리보기</h2>
            <div class="file-name" id="currentFileName">선택된 보고서가 없습니다</div>
          </div>
          <div class="viewer-toolbar" id="viewerToolbar">
            <button class="viewer-button" type="button" id="zoomOutButton">축소</button>
            <span class="zoom-label" id="zoomLabel">100%</span>
            <button class="viewer-button" type="button" id="zoomInButton">확대</button>
          </div>
          <a class="open-link" id="openLink" href="#" target="_blank" rel="noopener">새 창에서 열기</a>
        </div>
        <div class="viewer" id="documentViewer">
          <div class="empty-viewer">
            <div class="empty-card">
              <div class="empty-icon">+</div>
              <strong>아직 업로드된 문서가 없습니다.</strong>
              <p class="info-text">오른쪽 영역에서 보고서 파일을 업로드해 주세요.</p>
            </div>
          </div>
        </div>
      </article>

      <aside class="side">
        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">파일 목록</h2>
          </div>
          <ul class="file-list" id="fileList"></ul>
          <p class="empty-message" id="emptyFileMessage">등록된 파일이 없습니다.</p>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2 class="panel-title">파일 업로드</h2>
          </div>
          <div class="upload-body">
            <form method="POST" action="/upload" enctype="multipart/form-data" class="upload-form" onsubmit="return checkAccess(event)">
              <label class="file-picker" for="reportFile">
                <span class="file-picker-button">파일 선택</span>
                <span class="selected-file" id="selectedFileName">선택된 파일 없음</span>
              </label>
              <input type="file" id="reportFile" name="file" accept=".pdf" required>
              <input type="password" id="passwordInput" placeholder="비밀번호" required>
              <button class="upload-button" type="submit">업로드</button>
            </form>
            <p class="info-text">문서 파일만 업로드할 수 있습니다. 최대 100MB까지 지원합니다.</p>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const UPLOAD_PASSWORD = "7005425";
    const reportFile = document.getElementById("reportFile");
    const selectedFileName = document.getElementById("selectedFileName");
    const zoomInButton = document.getElementById("zoomInButton");
    const zoomOutButton = document.getElementById("zoomOutButton");
    const zoomLabel = document.getElementById("zoomLabel");
    const viewerToolbar = document.getElementById("viewerToolbar");
    let activeFilename = "";
    let zoomScale = window.matchMedia("(max-width: 860px)").matches ? 1.7 : 1;
    let renderToken = 0;
    let pdfjsLib = null;

    const pdfJsReady = import("https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs")
      .then(function (module) {
        pdfjsLib = module;
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs";
        return pdfjsLib;
      })
      .catch(function () {
        return null;
      });

    if (reportFile && selectedFileName) {
      reportFile.addEventListener("change", function () {
        selectedFileName.textContent = this.files.length ? this.files[0].name : "선택된 파일 없음";
      });
    }

    function checkAccess(event) {
      const password = document.getElementById("passwordInput").value;
      if (password !== UPLOAD_PASSWORD) {
        event.preventDefault();
        alert("비밀번호가 올바르지 않습니다.");
        return false;
      }
      return true;
    }

    function makeFileUrl(filename) {
      return "/uploads/" + encodeURIComponent(filename);
    }

    function updateZoomLabel() {
      zoomLabel.textContent = Math.round(zoomScale * 100) + "%";
    }

    updateZoomLabel();

    function showEmptyViewer() {
      const documentViewer = document.getElementById("documentViewer");
      const currentFileName = document.getElementById("currentFileName");
      const openLink = document.getElementById("openLink");

      activeFilename = "";
      currentFileName.textContent = "선택된 보고서가 없습니다";
      openLink.classList.remove("is-visible");
      openLink.removeAttribute("href");
      viewerToolbar.classList.remove("is-visible");
      documentViewer.innerHTML =
        '<div class="empty-viewer">' +
        '<div class="empty-card">' +
        '<div class="empty-icon">+</div>' +
        '<strong>아직 업로드된 문서가 없습니다.</strong>' +
        '<p class="info-text">오른쪽 영역에서 보고서 파일을 업로드해 주세요.</p>' +
        '</div>' +
        '</div>';
    }

    function showViewerMessage(message) {
      const documentViewer = document.getElementById("documentViewer");
      documentViewer.innerHTML =
        '<div class="viewer-message">' +
        '<div class="empty-card">' +
        '<strong>' + message + '</strong>' +
        '</div>' +
        '</div>';
    }

    async function renderDocument(filename) {
      const localUrl = makeFileUrl(filename);
      const documentViewer = document.getElementById("documentViewer");
      const token = ++renderToken;

      showViewerMessage("보고서를 불러오는 중입니다.");

      try {
        const pdfLibrary = await pdfJsReady;
        if (!pdfLibrary) {
          documentViewer.innerHTML = '<iframe title="보고서 미리보기" src="' + localUrl + '"></iframe>';
          return;
        }

        const loadingTask = pdfLibrary.getDocument(localUrl);
        const pdf = await loadingTask.promise;

        if (token !== renderToken) return;
        documentViewer.innerHTML = "";

        for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
          if (token !== renderToken) return;

          const page = await pdf.getPage(pageNumber);
          const baseViewport = page.getViewport({ scale: 1 });
          const availableWidth = Math.max(documentViewer.clientWidth - 36, 280);
          const fitScale = availableWidth / baseViewport.width;
          const viewport = page.getViewport({ scale: fitScale * zoomScale });
          const canvas = document.createElement("canvas");
          const context = canvas.getContext("2d");

          canvas.className = "pdf-page";
          canvas.width = Math.floor(viewport.width);
          canvas.height = Math.floor(viewport.height);
          canvas.style.maxWidth = Math.floor(viewport.width) + "px";

          documentViewer.appendChild(canvas);
          await page.render({ canvasContext: context, viewport: viewport }).promise;
        }
      } catch (error) {
        showViewerMessage("미리보기를 불러오지 못했습니다. 새 창에서 열기를 이용해 주세요.");
      }
    }

    function viewDocument(filename) {
      const localUrl = makeFileUrl(filename);
      const currentFileName = document.getElementById("currentFileName");
      const openLink = document.getElementById("openLink");

      activeFilename = filename;
      currentFileName.textContent = filename;
      openLink.href = localUrl;
      openLink.classList.add("is-visible");
      viewerToolbar.classList.add("is-visible");
      renderDocument(filename);
    }

    zoomOutButton.addEventListener("click", function () {
      if (!activeFilename) return;
      zoomScale = Math.max(0.6, Math.round((zoomScale - 0.1) * 10) / 10);
      updateZoomLabel();
      renderDocument(activeFilename);
    });

    zoomInButton.addEventListener("click", function () {
      if (!activeFilename) return;
      zoomScale = Math.min(2.4, Math.round((zoomScale + 0.1) * 10) / 10);
      updateZoomLabel();
      renderDocument(activeFilename);
    });

    function renderFileList(files) {
      const list = document.getElementById("fileList");
      const emptyMessage = document.getElementById("emptyFileMessage");
      const documentCount = document.getElementById("documentCount");

      list.innerHTML = "";
      documentCount.textContent = "문서 " + files.length + "건";

      if (!files.length) {
        emptyMessage.style.display = "block";
        showEmptyViewer();
        return;
      }

      emptyMessage.style.display = "none";
      files.forEach(function (filename) {
        const item = document.createElement("li");
        const button = document.createElement("button");
        const icon = document.createElement("span");
        const text = document.createElement("span");

        item.className = "file-item";
        button.className = "file-link";
        button.type = "button";
        icon.className = "file-icon";
        icon.textContent = "문서";
        text.className = "file-text";
        text.textContent = filename;

        button.addEventListener("click", function () {
          viewDocument(filename);
        });

        button.appendChild(icon);
        button.appendChild(text);
        item.appendChild(button);
        list.appendChild(item);
      });

      viewDocument(files[0]);
    }

    fetch("/api/files")
      .then(function (response) {
        if (!response.ok) throw new Error("파일 목록을 불러오지 못했습니다.");
        return response.json();
      })
      .then(function (data) {
        renderFileList(data.files || []);
      })
      .catch(function () {
        renderFileList([]);
      });
  </script>
</body>
</html>
